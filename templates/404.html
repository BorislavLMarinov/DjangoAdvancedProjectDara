{% extends "base.html" %}
{% block body_class %}error-404{% endblock %}
{% block title %}404 - Mission Not Found{% endblock %}
{% block content %}
<div class="error-container text-center py-5">
    <div class="error-icon mb-4">
        <i class="bi bi-geo-alt-fill text-primary" style="font-size: 5rem;"></i>
    </div>
    <h1 class="display-1 fw-bold text-primary">404</h1>
    <h2>Lost in the Training Center?</h2>
    <p class="lead">The page or mission you are looking for hasn't debuted yet.</p>
    <div class="mt-4">
        <a href="{% url 'home' %}" class="btn btn-primary">Back to Home</a>
        <a href="{% url 'challenges:mission-list' %}" class="btn btn-outline-secondary">Go to Mission Board</a>
    </div>
</div>
{% endblock %}

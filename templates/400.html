{% extends "base.html" %}
{% block body_class %}error-400{% endblock %}
{% block title %}400 - Bad Request{% endblock %}
{% block content %}
<div class="error-container text-center py-5">
    <div class="error-icon mb-4">
        <i class="bi bi-music-note-beamed text-secondary" style="font-size: 5rem;"></i>
    </div>
    <h1 class="display-1 fw-bold text-secondary">400</h1>
    <h2>Off-Beat Request!</h2>
    <p class="lead">Your performance (request) was a bit out of sync with our system.</p>
    <div class="mt-4">
        <a href="{% url 'home' %}" class="btn btn-secondary">Try Again From Home</a>
    </div>
</div>
{% endblock %}

{% extends "base.html" %}
{% block title %}403 - Forbidden Access{% endblock %}
{% block content %}
<div class="error-container text-center py-5">
    <div class="error-icon mb-4">
        <i class="bi bi-shield-lock-fill text-warning" style="font-size: 5rem;"></i>
    </div>
    <h1 class="display-1 fw-bold text-warning">403</h1>
    <h2>Backstage Access Only!</h2>
    <p class="lead">Stop! Only authorized Architects and Staff are allowed in this training room.</p>
    <div class="mt-4">
        <a href="{% url 'home' %}" class="btn btn-warning">Return to Safe Area</a>
    </div>
</div>
{% endblock %}

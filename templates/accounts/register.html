{% extends 'base.html' %}

{% block title %}Register | ProjectDara{% endblock %}

{% block content %}
    <section class="auth-form">
        <h2>Register</h2>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Create Account</button>
        </form>
        <p>Already have an account? <a href="{% url 'accounts:login' %}">Login here</a>.</p>
    </section>
{% endblock %}

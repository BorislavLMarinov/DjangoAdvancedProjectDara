{% extends 'base.html' %}

{% block title %}Login | ProjectDara{% endblock %}

{% block content %}
    <section class="auth-form">
        <h2>Login</h2>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Login</button>
        </form>
        <p>No account yet? <a href="{% url 'accounts:register' %}">Register here</a>.</p>
    </section>
{% endblock %}

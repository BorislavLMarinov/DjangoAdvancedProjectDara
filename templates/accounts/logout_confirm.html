{% extends 'base.html' %}

{% block title %}Logout | ProjectDara{% endblock %}

{% block content %}
    <section class="auth-confirm">
        <h2>Logout</h2>
        <p>Are you sure you want to log out?</p>
        <form method="post">
            {% csrf_token %}
            <button type="submit">Yes, log out</button>
            <a href="{% url 'home' %}">Cancel</a>
        </form>
    </section>
{% endblock %}

{% extends 'base.html' %}

{% block title %}Edit Profile | ProjectDara{% endblock %}

{% block content %}
    <section class="profile-edit">
        <h2>Edit Your Profile</h2>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Save Changes</button>
            <a href="{% url 'home' %}">Cancel</a>
        </form>
    </section>
{% endblock %}
